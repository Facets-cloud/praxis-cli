version: 2

# Praxis CLI release config.
#
# Produces RAW BINARIES (not tarballs) for darwin/linux × amd64/arm64,
# named `praxis_<os>_<arch>`. The `praxis update` self-updater downloads
# these directly and verifies them against checksums.txt.

project_name: praxis

before:
  hooks:
    - go mod tidy

builds:
  - id: praxis
    main: .
    binary: praxis
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/Facets-cloud/praxis-cli/cmd.version={{ .Version }}
      - -X github.com/Facets-cloud/praxis-cli/cmd.commit={{ .ShortCommit }}
      - -X github.com/Facets-cloud/praxis-cli/cmd.date={{ .Date }}

archives:
  - id: praxis
    ids: [praxis]
    formats: [binary]
    name_template: "praxis_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ .Version }}-snapshot-{{ .ShortCommit }}"

release:
  github:
    owner: Facets-cloud
    name: praxis-cli
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"

homebrew_casks:
  - name: praxis
    ids: [praxis]
    binaries: [praxis]
    repository:
      owner: Facets-cloud
      name: homebrew-tap
      branch: main
      # Without an explicit token, goreleaser falls back to the
      # workflow's GITHUB_TOKEN — which is scoped only to praxis-cli
      # and cannot write to a different repo (returns 403 "Resource
      # not accessible by integration"). The HOMEBREW_TAP_TOKEN
      # env var is set by .github/workflows/release.yml from the
      # repo secret of the same name.
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: https://askpraxis.ai
    description: Bring Praxis cloud capabilities to any local AI host
    license: MIT
    # Helps `brew audit` pass when homepage domain differs from the
    # GitHub Releases download domain.
    url:
      verified: github.com/Facets-cloud/praxis-cli/
    # Binary is unsigned/un-notarized — strip the macOS quarantine
    # attribute on install so Gatekeeper doesn't block first launch.
    # Operate on staged_path (the dir) rather than a specific filename:
    # the staged file keeps its per-arch download name (e.g.
    # `praxis_darwin_arm64`); `target: "praxis"` only renames the
    # symlink in `bin/`, not the file on disk.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", staged_path.to_s]
          end
    commit_author:
      name: praxis-bot
      email: bot@askpraxis.ai

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
