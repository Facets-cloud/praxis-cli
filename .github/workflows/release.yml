name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Verify HOMEBREW_TAP_TOKEN propagates + can write to homebrew-tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN secret is empty / unset"
            exit 1
          fi
          echo "token length: ${#HOMEBREW_TAP_TOKEN}"
          echo "token prefix: ${HOMEBREW_TAP_TOKEN:0:14}…"
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $HOMEBREW_TAP_TOKEN" \
            https://api.github.com/repos/Facets-cloud/homebrew-tap)
          echo "GET homebrew-tap returned HTTP $code"
          if [ "$code" != "200" ]; then
            echo "::error::Token cannot read homebrew-tap (HTTP $code) — goreleaser will fail"
            exit 1
          fi

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # GITHUB_TOKEN can publish releases on this repo only.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # HOMEBREW_TAP_TOKEN is referenced by .goreleaser.yml's
          # homebrew_casks[].repository.token to push the cask update to
          # Facets-cloud/homebrew-tap (a different repo than this one).
          # Must be a PAT with write access to that repo.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      # Bundle the `ig` build tool into this PUBLIC release.
      #
      # `ig` lives in the PRIVATE Facets-cloud/infragraphify repo, so its own
      # release assets require auth to download. praxis-cli is public and its
      # release assets do not — so a source repo's CI can fetch `ig` here with
      # NO GitHub token, exactly as it already fetches `praxis`. Only the
      # COMPILED binary is copied; ig source never leaves the private repo, and
      # praxis-cli's own source stays public-buildable (ig is NOT a Go-module
      # dependency — it rides along purely as a release artifact).
      #
      # Version story: praxis vX.Y ships the ig pinned in the IG_VERSION repo
      # variable. Bump that variable to ship a newer ig with the next praxis
      # release. The server (agent-factory) pins its own ig independently; this
      # is only the copy that source-repo CI uses to BUILD member graphs.
      - name: Bundle the ig build binary into this release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # write assets to THIS release
          # A PAT (or fine-grained token) with contents:read on
          # Facets-cloud/infragraphify. Read-only; never exposed to forks.
          IG_FETCH_TOKEN: ${{ secrets.IG_FETCH_TOKEN }}
          # e.g. "v0.2.2". Repo/org variable so bumping ig is a one-line change.
          IG_VERSION: ${{ vars.IG_VERSION }}
        run: |
          set -euo pipefail
          if [ -z "${IG_FETCH_TOKEN:-}" ] || [ -z "${IG_VERSION:-}" ]; then
            echo "::error::IG_FETCH_TOKEN and the IG_VERSION variable must both be set to bundle ig"
            exit 1
          fi
          tmp="$(mktemp -d)"
          # Match the arch matrix goreleaser ships for praxis, so `ig` is
          # available on every platform a source repo's runner might use.
          for a in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64; do
            GH_TOKEN="$IG_FETCH_TOKEN" gh release download "$IG_VERSION" \
              --repo Facets-cloud/infragraphify \
              --pattern "ig-$a" --dir "$tmp"
          done
          # Attach to the tag goreleaser just published. --clobber keeps a
          # re-run of this job idempotent.
          gh release upload "${GITHUB_REF_NAME}" "$tmp"/ig-* \
            --repo "${GITHUB_REPOSITORY}" --clobber
          echo "Bundled ig ${IG_VERSION} (4 arches) into ${GITHUB_REF_NAME}"
